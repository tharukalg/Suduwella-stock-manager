# ═══════════════════════════════════════════════════════════════════════════════
# Suduwella Stock Manager — Data Connect Mutations
# @auth(level: USER_ANON)  → no Firebase Auth required (MVP / development).
# Upgrade to @auth(level: USER) once Firebase Auth is added.
# insecureReason: This is an internal staff-only app; all authenticated users
#                 are trusted employees — no per-user data isolation needed.
# ═══════════════════════════════════════════════════════════════════════════════

# ─── branches ────────────────────────────────────────────────────────────────
mutation UpsertBranch($id: String!, $name: String!, $isActive: Boolean!) @auth(level: USER_ANON, insecureReason: "Internal staff app — all authenticated users are trusted employees") {
  branch_upsert(data: {
    id: $id
    name: $name
    isActive: $isActive
  })
}

mutation DeleteBranch($id: String!) @auth(level: USER_ANON, insecureReason: "Internal staff app — all authenticated users are trusted employees") {
  branch_delete(id: $id)
}

# ─── products ────────────────────────────────────────────────────────────────
mutation UpsertProduct(
  $id: String!
  $productName: String!
  $modelNo: String!
  $price: Float!
  $imagePath: String
  $createdAt: Float!
  $updatedAt: Float!
) @auth(level: USER_ANON, insecureReason: "Internal staff app — all authenticated users are trusted employees") {
  product_upsert(data: {
    id: $id
    productName: $productName
    modelNo: $modelNo
    price: $price
    imagePath: $imagePath
    createdAt: $createdAt
    updatedAt: $updatedAt
    syncStatus: "synced"
  })
}

mutation DeleteProduct($id: String!) @auth(level: USER_ANON, insecureReason: "Internal staff app — all authenticated users are trusted employees") {
  product_delete(id: $id)
}

